<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>EMT 時間軸勤務</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand-row">
          <div class="brand">
            <img class="brand-logo" src="assets/star-of-life.png" alt="救護標誌" />
            <div>
              <h1 class="brand-title">救護義消協勤日誌</h1>
              <p id="brandMeta" class="brand-meta"></p>
              <p id="pendingStatus" class="pending-status hidden"></p>
            </div>
          </div>
          <button id="profileBtn" type="button" class="avatar-btn" aria-label="開啟個人資料">
            <img id="profileAvatar" src="assets/star-of-life.png" alt="帳號頭像" />
          </button>
        </div>
      </header>

      <section id="authCard" class="card">
        <h2>登入</h2>
        <p class="hint">先登入才能開始與續接勤務。</p>
        <div class="login-btn-row">
          <button id="googleLoginBtn" type="button" class="primary google-login-btn">
            <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="#EA4335"
                d="M12 10.2v3.9h5.4c-.2 1.2-1.4 3.6-5.4 3.6-3.2 0-5.9-2.7-5.9-6s2.6-6 5.9-6c1.8 0 3 .8 3.7 1.4l2.5-2.4C16.6 3.3 14.5 2.4 12 2.4 6.9 2.4 2.8 6.6 2.8 11.7S6.9 21 12 21c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.9-.1-1.2H12z"
              />
              <path
                fill="#34A853"
                d="M3.8 7.2l3.2 2.3c.9-1.8 2.8-3 5-3 1.8 0 3 .8 3.7 1.4l2.5-2.4C16.6 3.3 14.5 2.4 12 2.4c-3.8 0-7.1 2.2-8.2 4.8z"
              />
              <path
                fill="#4A90E2"
                d="M12 21c2.4 0 4.5-.8 6-2.3l-2.8-2.2c-.8.6-1.8 1.1-3.2 1.1-2.5 0-4.5-1.6-5.3-3.8l-3.3 2.5C4.7 18.9 8.1 21 12 21z"
              />
              <path
                fill="#FBBC05"
                d="M6.7 13.8c-.2-.6-.4-1.3-.4-2s.1-1.4.4-2L3.4 7.3C2.9 8.4 2.6 9.6 2.6 11c0 1.4.3 2.6.8 3.7l3.3-2.5z"
              />
            </svg>
            <span>使用 Google 登入</span>
          </button>
        </div>
      </section>

      <section id="workCard" class="hidden">
        <section id="summaryCard" class="card">
          <h2 class="overview-title">紀錄總覽</h2>
          <div id="summaryTabs" class="summary-tabs" aria-label="摘要區間">
            <button type="button" class="tab active" data-range="today">今日</button>
            <button type="button" class="tab" data-range="month">本月</button>
            <button type="button" class="tab" data-range="year">本年</button>
            <button type="button" class="tab" data-range="all">總紀錄</button>
            <button id="historyToggleBtn" type="button" class="tab history-tab" aria-expanded="false" aria-controls="historyPanel" aria-label="切換歷史紀錄">
              <svg class="history-tab-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="2"></rect>
                <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                <path d="M3 9H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
            </button>
          </div>
          <div class="stats">
            <article><p>協勤時數</p><strong id="sumDutyHours">00:00</strong></article>
            <article><p>出勤次數</p><strong id="sumEventCount">0</strong></article>
            <article><p>送醫人數</p><strong id="sumTransported">0</strong></article>
          </div>
          <div id="summaryHistory" class="summary-history">
            <div id="historyPanel" class="history-panel hidden">
              <div class="history-controls">
                <select id="historyDateList" aria-label="有紀錄日期"></select>
                <input id="historyDate" type="date" />
                <button id="loadHistoryBtn" type="button" class="ghost">查詢</button>
              </div>
              <div id="historyList" class="history-list"></div>
              <p id="historyStatus" class="hint"></p>
            </div>
          </div>
        </section>

        <section class="card today-duty-card">
          <div class="today-duty-head">
            <h2>今日勤務</h2>
            <div class="today-duty-actions">
              <button id="sortTimelineBtn" type="button" class="icon-btn ghost-icon" aria-label="切換排序（目前：新到舊）">⇅</button>
              <button id="deleteTodayBtn" type="button" class="icon-btn danger-icon" aria-label="刪除今日紀錄">🗑</button>
            </div>
          </div>
          <div id="todayEmpty" class="today-empty hidden">
            <button id="startShiftBtn" type="button" class="primary big-start-btn">開始協勤</button>
          </div>
          <div id="timelineList" class="timeline"></div>
          <div id="todayResumeWrap" class="today-resume-wrap hidden">
            <button id="resumeShiftBtn" type="button" class="primary">開始協勤</button>
          </div>
        </section>
      </section>
    </main>

    <footer id="actionBar" class="action-bar hidden">
      <button id="startEventBtn" class="primary" type="button">開始出勤</button>
      <button id="finishEventBtn" class="danger-soft" type="button">退勤</button>
    </footer>

    <section id="eventSheet" class="sheet hidden">
      <div class="sheet-body">
        <h2 id="eventSheetTitle">結束出勤</h2>
        <form id="eventForm" class="form">
          <label>
            結束時間
            <div class="inline">
              <input id="eventFinishTime" type="text" inputmode="numeric" placeholder="YYYY-MM-DD HH:mm" required />
              <button id="fillEventNowBtn" class="small" type="button">現在</button>
            </div>
          </label>
          <div class="tri-row">
            <label>
              醫院
              <select id="hospital" required>
                <option value="未選" selected>未選</option>
                <option value="雙和">雙和</option>
                <option value="永和耕莘">永和耕莘</option>
                <option value="慈濟">慈濟</option>
                <option value="新店耕莘">新店耕莘</option>
                <option value="板醫">板醫</option>
                <option value="西園">西園</option>
                <option value="台大">台大</option>
                <option value="未送">未送</option>
              </select>
            </label>
            <label>
              人數
              <select id="patientCount" required>
                <option value="0">0</option>
                <option value="1" selected>1</option>
                <option value="2">2</option>
              </select>
            </label>
            <label>
              科別
              <select id="caseType" required>
                <option value="外科" selected>外科</option>
                <option value="內科">內科</option>
                <option value="火警">火警</option>
                <option value="其他">其他</option>
              </select>
            </label>
          </div>
          <div class="tri-row vital-row">
            <label>
              血壓
              <input id="bp" type="text" inputmode="numeric" pattern="[0-9/]*" />
            </label>
            <label>
              血氧
              <input id="spo2" type="text" inputmode="numeric" pattern="[0-9]*" />
            </label>
            <label>
              脈搏
              <input id="pulse" type="text" inputmode="numeric" pattern="[0-9]*" />
            </label>
          </div>
          <label>
            主訴
            <textarea id="chiefComplaint" rows="2" placeholder="可輸入主訴"></textarea>
          </label>
          <details class="equipment-collapsible">
            <summary>使用器材（12 項）</summary>
            <fieldset class="equipment-grid">
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="血糖" /><span>血糖</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="氧氣" /><span>氧氣</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="傷口處理" /><span>傷口處理</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="IV" /><span>IV</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="AED" /><span>AED</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="BVM" /><span>BVM</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="抽吸器" /><span>抽吸器</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="頸圈" /><span>頸圈</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="長背板" /><span>長背板</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="止血帶" /><span>止血帶</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="紗布敷料" /><span>紗布敷料</span></label>
              <label class="check-line"><input type="checkbox" name="equipmentItem" value="心電貼片" /><span>心電貼片</span></label>
            </fieldset>
          </details>
          <label>
            備註
            <textarea id="memo" rows="2"></textarea>
          </label>
          <div class="sheet-actions">
            <button id="saveDraftBtn" type="button" class="ghost">暫存</button>
            <button id="confirmFinishBtn" type="submit" class="primary">確認結束</button>
            <button id="cancelEventBtn" type="button" class="ghost">取消</button>
          </div>
          <p id="eventStatus" class="hint"></p>
        </form>
      </div>
    </section>

    <section id="profileSheet" class="sheet hidden">
      <div class="sheet-body">
        <h2>個人資料</h2>
        <form id="profileForm" class="form">
          <label>
            帳號
            <input id="profileEmail" type="text" readonly />
          </label>
          <label>
            顯示名稱
            <input id="profileDisplayName" type="text" />
          </label>
          <label>
            分隊/單位
            <input id="profileUnit" type="text" />
          </label>
          <label>
            職稱
            <input id="profileTitle" type="text" />
          </label>
          <label>
            聯絡電話
            <input id="profilePhone" type="text" inputmode="tel" />
          </label>
          <label>
            帳號 Logo（JPG/PNG）
            <input id="profileAvatarFile" type="file" accept="image/png,image/jpeg" />
          </label>
          <div class="avatar-preview-wrap">
            <img id="profileAvatarPreview" alt="頭像預覽" />
          </div>
          <div class="sheet-actions">
            <button id="saveProfileBtn" type="submit" class="primary">儲存</button>
            <button id="cancelProfileBtn" type="button" class="ghost">取消</button>
            <button id="logoutBtn" type="button" class="danger">登出</button>
          </div>
          <div class="sheet-actions debug-actions">
            <button id="copyDebugLogBtn" type="button" class="ghost">複製偵錯記錄</button>
            <button id="clearDebugLogBtn" type="button" class="ghost">清除偵錯記錄</button>
          </div>
          <p id="profileStatus" class="hint"></p>
        </form>
      </div>
    </section>

    <div id="syncIndicator" class="sync-indicator hidden" aria-live="polite" aria-busy="false">
      <div class="sync-box" role="status" aria-live="polite">
        <span class="sync-spinner" aria-hidden="true"></span>
        <span id="syncText">資料同步中...</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
