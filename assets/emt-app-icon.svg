        <rect x="-58" y="-360" width="116" height="720" rx="20"/>
        <rect x="-58" y="-360" width="116" height="720" rx="20" transform="rotate(60)"/>
        <rect x="-58" y="-360" width="116" height="720" rx="20" transform="rotate(120)"/>
      </g>
      <rect x="-56" y="-360" width="112" height="720" rx="16" fill="#0D49BD" stroke="#EAF4FF" stroke-width="10"/>
      <path d="M0 -292
               C46 -248 46 -190 0 -140
               C-46 -90 -46 -34 0 8
               C44 48 44 106 0 150
               C-44 194 -44 254 0 300" fill="none" stroke="#EAF4FF" stroke-width="28" stroke-linecap="round"/>
      <circle cx="0" cy="-292" r="17" fill="#EAF4FF"/>
      <circle cx="0" cy="300" r="17" fill="#EAF4FF"/>
    </g>
