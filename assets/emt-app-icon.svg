<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="EMT App Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A7FB8"/>
      <stop offset="100%" stop-color="#0B5A8A"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FA8FF"/>
      <stop offset="100%" stop-color="#0A43C7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#073550" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="960" height="960" rx="220" fill="url(#bg)"/>

  <g filter="url(#shadow)">
