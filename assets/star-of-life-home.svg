<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Star of Life Home Icon">
  <defs>
    <linearGradient id="emtBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12a0c6"/>
      <stop offset="100%" stop-color="#0d7ea0"/>
    </linearGradient>
    <linearGradient id="emtBlueDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d7ea0"/>
      <stop offset="100%" stop-color="#0a637f"/>
    </linearGradient>
  </defs>

  <!-- Star of Life -->
  <g transform="translate(256 256)">
    <g fill="url(#emtBlue)" stroke="#eaf5ff" stroke-width="8" stroke-linejoin="round">
      <rect x="-30" y="-220" width="60" height="440" rx="10"/>
      <rect x="-30" y="-220" width="60" height="440" rx="10" transform="rotate(60)"/>
      <rect x="-30" y="-220" width="60" height="440" rx="10" transform="rotate(120)"/>
    </g>

    <!-- Center staff -->
    <rect x="-23" y="-220" width="46" height="440" rx="9" fill="url(#emtBlueDark)" stroke="#eaf5ff" stroke-width="5"/>

    <!-- Snake / rod line -->
    <path d="M0 -174
             C30 -144 30 -104 0 -74
             C-30 -44 -30 -7 0 22
             C28 50 28 90 0 120
             C-28 150 -28 190 0 220"
          fill="none"
          stroke="#ffffff"
          stroke-width="16"
          stroke-linecap="round"/>
  </g>
</svg>
